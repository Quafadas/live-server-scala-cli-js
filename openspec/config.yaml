context: |
  Tech stack: scala
  build tool: mill
  Testing: munit
  Style guide:
    Prefer braces over end markers.
    Use braces around a long scope that is not terminated by some keyword. A long scope is a scope that contains blank lines which are not already embedded in a nested construct. However, braces are not necessary if the scope is already terminated by a closing keyword such as else, do, yield, case, or catch since that keyword effectively serves as the end marker for the scope.
    Do consider inserting blank lines following logical structure to make up for the lack of vertical whitespace that was enforced previously by closing braces.
    Add braces where it aids understanding.
    Prefer the new control constructs (e.g. if-then-else, rather than if(...)-else).
    For classes and function calls with short bodies: no braces
  Domain: scala js tooling