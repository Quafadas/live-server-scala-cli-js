name: Continuous Integration

on:
  pull_request:
    branches: ['**', '!update/**', '!pr/**']
  push:
    branches: ['main']
    tags: [v*]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  FORCE_COLOR: '1'

concurrency:
  group: ${{ github.workflow }} @ ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test
    strategy:
      matrix:
        os: [ubuntu-latest]
        scala: [3]
        java: [temurin@25]
        project: [jvm]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: taiki-e/install-action@just
      - uses: coursier/cache-action@v8
      - uses: coursier/setup-action@main
        with:
          jvm: temurin@25
          apps: scala-cli
      - name: Checkout current branch (full)
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: Install required libraries
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libgraphene-1.0-dev libavif-dev

      - name: Install binaryen (wasm-opt)
        run: |
          BINARYEN_VERSION=$(curl -s https://api.github.com/repos/WebAssembly/binaryen/releases/latest | jq -r .tag_name)
          curl -L "https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN_VERSION}/binaryen-${BINARYEN_VERSION}-x86_64-linux.tar.gz" | tar xz
          sudo cp binaryen-${BINARYEN_VERSION}/bin/wasm-opt /usr/local/bin/
          wasm-opt --version

      - name: Install terser
        run: npm install -g terser

      - name: Cache Playwright dependencies
        id: cache-pw
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('playwrightVersion.mill') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: formatCheck
        run: ./mill mill.scalalib.scalafmt.ScalafmtModule/checkFormatAll __.sources

      - name: Install Playwright
        run: ./mill PlaywrightSetup install --with-deps

      - name: compile
        run: ./mill __.compile && ./mill sjsls.jvm.test.buildInfoMembers

      - name: scala-cli version
        run: |
          BUILD_INFO_JSON="$(./mill show sjsls.jvm.test.buildInfoMembers | sed -n '/^\[$/,/^]$/p')"
          SCALA_VERSION="$(printf '%s\n' "$BUILD_INFO_JSON" | jq -r '.[] | select(.key == "scalaVersion") | .value')"
          SCALA_JS_VERSION="$(printf '%s\n' "$BUILD_INFO_JSON" | jq -r '.[] | select(.key == "scalaJsVersion") | .value')"
          scala-cli compile -e "()" --platform js --scala "$SCALA_VERSION" --js-version "$SCALA_JS_VERSION" && scala-cli run -e "()" --platform js --scala "$SCALA_VERSION" --js-version "$SCALA_JS_VERSION"

      - name: Test
        run: ./mill __.test

      - name: Test
        run: ./mill plugin.integration.testForked

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          fail_on_failure: false
          include_passed: false
          detailed_summary: true
          annotate_only: true
          require_tests: false
          report_paths: 'out/**/test-report.xml'

  publish:
    if: github.repository == 'Quafadas/live-server-scala-cli-js' && contains(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: coursier/cache-action@v8
      - uses: coursier/setup-action@main
        with:
          jvm: temurin@25
          apps: scala-cli

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.PGP_SECRET }}
          passphrase: ${{ secrets.PUBLISH_SECRET_KEY_PASSWORD }}
          git_config_global: true

      - name: Prepare GPG
        run: |
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --reload gpg-agent

      - name: List keys
        run: gpg -K

      - name: Publish to Maven Central
        run: ./mill mill.javalib.SonatypeCentralPublishModule/publishAll --publishArtifacts __.publishArtifacts
        env:
          MILL_PGP_PASSPHRASE: ${{ secrets.PUBLISH_SECRET_KEY_PASSWORD }}
          MILL_PGP_SECRET_BASE64: ${{ secrets.PGP_SECRET }}
          MILL_SONATYPE_PASSWORD: ${{ secrets.PUBLISH_PASSWORD }}
          MILL_SONATYPE_USERNAME: ${{ secrets.PUBLISH_USER }}

  site:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: coursier/cache-action@v8
      - uses: coursier/setup-action@main
        with:
          jvm: temurin@25
          apps: scala-cli
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
          fetch-tags: true
      - run: ./mill site.siteGen
      - name: Setup Pages
        uses: actions/configure-pages@main
      - uses: actions/upload-artifact@main
        with:
          name: page
          path: out/site/laika/generateSite.dest
          if-no-files-found: error

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: site
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@main
      with:
        name: page
        path: .
    - uses: actions/configure-pages@main
    - uses: actions/upload-pages-artifact@main
      with:
        path: .
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@main