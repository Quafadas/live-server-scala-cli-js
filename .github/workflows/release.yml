name: Release
on:
  push:
    # branches: ["main"]
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos_build:
    name: MacOS (${{ matrix.OS }})
    strategy:
      fail-fast: true
      matrix:
        OS: ["macos-15"]
    runs-on: ${{ matrix.OS }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: coursier/cache-action@v8
      - uses: coursier/setup-action@main
        with:
          jvm: temurin@25

      - name: Build the binary
        run: mill jsls.native.nativeLink

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: out/sjsls/native/nativeLink.dest/*
          name: ${{ matrix.os }}-binaries
          if-no-files-found: error

  linux_build:
    name: Linux (${{ matrix.OS }})
    strategy:
      fail-fast: true
      matrix:
        OS: ["ubuntu-22.04", "ubuntu-22.04-arm"]
    runs-on: ${{ matrix.OS }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: coursier/cache-action@v8
      - uses: coursier/setup-action@main
        with:
          jvm: temurin@25


      - name: Build the binary
        run: sbt buildBinaryPlatformRelease

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: out/release/*
          name: ${{ matrix.os }}-linux-binaries
          if-no-files-found: error

  windows_build:
    name: Windows
    strategy:
      fail-fast: false
      matrix:
          OS: ["windows-2022"]
    runs-on: ${{ matrix.OS }}
    env:
      LLVM_BIN: 'C:\Program Files\LLVM\bin'
      LLVM_VERSION: "20.1.8"
    steps:
      # This step is important to make sure scalafmt
      # checks don't fail
      - name: Setup git config
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - uses: coursier/cache-action@v8
      - uses: coursier/setup-action@main
        with:
          jvm: temurin@25

      # See https://github.com/scala-native/scala-native/blob/master/.github/actions/windows-setup-env/action.yml#L14 SN_RELE
      # for details
      - name: Configure Pagefile
        uses: al-cheb/configure-pagefile-action@v1.2
        with:
          minimum-size: 4GB
          maximum-size: 16GB

      - run: clang -v
        shell: cmd

      - name: Install clang and SBT
        shell: pwsh
        run: |
          choco install llvm --version="$Env:LLVM_VERSION" --allow-downgrade
          choco install sbt --version=1.12.8
          clang --version

      - name: Build binary (windows)
        run: sbt buildBinaryPlatformRelease
        shell: cmd

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: out/release/*
          name: windows-binaries
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux_build, windows_build, macos_build]
    name: Upload binaries to release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download binaries
        uses: actions/download-artifact@v4
        id: download
        with:
          path: binaries

      - name: List downloaded binaries
        run: ls -R binaries

      - name: Upload release binaries
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: "${{steps.download.outputs.download-path}}/**/*"